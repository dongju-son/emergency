<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>긴급출동! 리틀 히어로 아카데미</title>
<style>
  :root{
    --bg-deep:#0f1b3d;
    --bg-mid:#1b2a5e;
    --accent:#ffb703;
    --accent2:#fb8500;
    --safe:#2ec4b6;
    --danger:#ef476f;
    --card:#1f2f66;
    --text:#f4f6ff;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    background:radial-gradient(circle at 50% 0%, var(--bg-mid), var(--bg-deep) 70%);
    color:var(--text);
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  #app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:1.2rem 1rem 2.5rem;
  }
  .screen{
    display:none;
    width:100%;
    max-width:480px;
    animation:fadeIn .35s ease;
  }
  .screen.active{display:flex;flex-direction:column;align-items:center;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  h1{font-size:1.5rem;text-align:center;margin:.4rem 0 .2rem;line-height:1.3;}
  .subtitle{color:#b9c3ff;font-size:.95rem;text-align:center;margin-bottom:1.4rem;}

  .hero-emoji{
    font-size:5.5rem;
    margin:.6rem 0 1rem;
    animation:float 3s ease-in-out infinite;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.35));
  }
  @keyframes float{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-10px) rotate(2deg);}}

  .btn{
    border:none;
    border-radius:16px;
    padding:.95rem 1.6rem;
    font-size:1.05rem;
    font-weight:700;
    cursor:pointer;
    width:100%;
    margin-top:.7rem;
    transition:transform .12s ease, filter .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#241300;
    box-shadow:0 6px 0 #b45a00, 0 10px 18px rgba(0,0,0,.35);
  }
  .btn-primary:active{box-shadow:0 2px 0 #b45a00;}
  .btn-ghost{
    background:transparent;
    color:var(--text);
    border:2px solid #3a4a90;
  }
  .progress-summary{
    background:var(--card);
    border-radius:16px;
    padding:.8rem 1rem;
    width:100%;
    text-align:center;
    margin-bottom:1rem;
    font-size:.9rem;
    color:#ffd166;
  }

  /* 사건 지도 */
  .map-header{width:100%;text-align:center;margin-bottom:1rem;}
  .stage-list{width:100%;display:flex;flex-direction:column;gap:.9rem;}
  .stage-card{
    background:var(--card);
    border-radius:20px;
    padding:1.1rem 1.2rem;
    display:flex;
    align-items:center;
    gap:1rem;
    cursor:pointer;
    border:2px solid transparent;
    transition:border-color .15s ease, transform .12s ease;
  }
  .stage-card:active{transform:scale(.98);}
  .stage-card.unlocked{border-color:var(--accent);}
  .stage-card.locked{opacity:.5;cursor:default;}
  .stage-emoji{font-size:2.4rem;flex-shrink:0;}
  .stage-info{flex:1;text-align:left;}
  .stage-title{font-weight:700;font-size:1.02rem;}
  .stage-desc{font-size:.82rem;color:#b9c3ff;margin-top:.15rem;}
  .stage-stars{font-size:1rem;margin-top:.3rem;letter-spacing:2px;}

  /* 배틀 화면 */
  .battle-topbar{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;font-size:.85rem;color:#b9c3ff;}
  .gauge-wrap{width:100%;margin-bottom:1.1rem;}
  .gauge-label{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.3rem;color:#ffd166;font-weight:700;}
  .gauge-bar{
    width:100%;height:18px;border-radius:10px;
    background:#2a2f5c;
    overflow:hidden;
    border:2px solid #3a4a90;
  }
  .gauge-fill{
    height:100%;
    border-radius:10px;
    background:linear-gradient(90deg,var(--safe),#8ee0d6);
    transition:width .5s cubic-bezier(.4,0,.2,1), background .3s ease;
    width:100%;
  }
  .gauge-fill.warn{background:linear-gradient(90deg,#ffd166,var(--accent2));}
  .gauge-fill.danger{background:linear-gradient(90deg,var(--danger),#ff8fa3);}

  .situation-box{
    background:var(--card);
    border-radius:20px;
    width:100%;
    padding:1.3rem 1rem;
    text-align:center;
    margin-bottom:1.1rem;
  }
  .situation-emoji{font-size:4rem;transition:transform .18s ease;}
  .situation-emoji.shake{animation:shake .4s ease;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px) rotate(-3deg);}
    40%{transform:translateX(8px) rotate(3deg);}
    60%{transform:translateX(-6px) rotate(-2deg);}
    80%{transform:translateX(6px) rotate(2deg);}
  }
  .situation-emoji.zap{animation:zap .4s ease;}
  @keyframes zap{
    0%{transform:scale(1);}
    50%{transform:scale(1.25);}
    100%{transform:scale(1);}
  }
  .situation-text{margin-top:.8rem;font-size:1.02rem;line-height:1.5;}

  .options{width:100%;display:flex;flex-direction:column;gap:.65rem;margin-bottom:.8rem;}
  .option-btn{
    background:var(--card);
    border:2px solid #3a4a90;
    color:var(--text);
    border-radius:14px;
    padding:.85rem 1rem;
    font-size:.98rem;
    text-align:left;
    cursor:pointer;
    transition:transform .1s ease, border-color .15s ease, background .15s ease;
  }
  .option-btn:active{transform:scale(.97);}
  .option-btn.correct{background:var(--safe);border-color:var(--safe);color:#04302b;font-weight:700;}
  .option-btn.wrong{background:var(--danger);border-color:var(--danger);color:#3a0012;font-weight:700;}
  .option-btn[disabled]{cursor:default;}

  .feedback{
    min-height:1.6rem;
    font-size:.95rem;
    text-align:center;
    margin-bottom:.4rem;
    color:#ffd166;
    line-height:1.5;
  }

  /* 클리어 화면 */
  .clear-emoji{font-size:5rem;margin-bottom:.5rem;animation:float 2.5s ease-in-out infinite;}
  .stars-big{font-size:2.4rem;letter-spacing:6px;margin:.6rem 0 1rem;}
  .stat-card{
    background:var(--card);
    border-radius:16px;
    padding:1rem;
    width:100%;
    text-align:center;
    margin-bottom:1.4rem;
    font-size:.95rem;
    color:#b9c3ff;
  }
  .stat-card b{color:var(--accent);font-size:1.1rem;}

  @media (min-width:600px){
    h1{font-size:1.8rem;}
    .hero-emoji{font-size:7rem;}
  }
</style>
</head>
<body>
<div id="app">

  <!-- 메인 화면 -->
  <section class="screen active" id="screen-main">
    <div class="hero-emoji">🦸‍♀️🚒</div>
    <h1>긴급출동!<br>리틀 히어로 아카데미</h1>
    <p class="subtitle">위험한 상황에 안전 행동으로 씩씩하게 맞서요!</p>
    <div class="progress-summary" id="main-progress" style="display:none;"></div>
    <button class="btn btn-primary" id="btn-start">모험 시작하기</button>
  </section>

  <!-- 사건 지도 -->
  <section class="screen" id="screen-map">
    <div class="map-header">
      <h1 style="font-size:1.3rem;">🗺️ 사건 지도</h1>
      <p class="subtitle">출동할 사건을 골라주세요</p>
    </div>
    <div class="stage-list">
      <div class="stage-card unlocked" id="stage-1-card">
        <div class="stage-emoji">🔥</div>
        <div class="stage-info">
          <div class="stage-title">1화 · 불이야! 소방 출동 훈련</div>
          <div class="stage-desc">불이 난 상황에서 안전하게 대피해요</div>
          <div class="stage-stars" id="stage-1-stars">☆☆☆</div>
        </div>
      </div>
      <div class="stage-card locked">
        <div class="stage-emoji">🔒</div>
        <div class="stage-info">
          <div class="stage-title">2화 · 준비 중이에요</div>
          <div class="stage-desc">다음 임무를 기다려주세요</div>
        </div>
      </div>
      <div class="stage-card locked">
        <div class="stage-emoji">🔒</div>
        <div class="stage-info">
          <div class="stage-title">3화 · 준비 중이에요</div>
          <div class="stage-desc">다음 임무를 기다려주세요</div>
        </div>
      </div>
    </div>
    <button class="btn btn-ghost" id="btn-map-back">메인으로</button>
  </section>

  <!-- 배틀 화면 -->
  <section class="screen" id="screen-battle">
    <div class="battle-topbar">
      <span id="battle-progress">문제 1/10</span>
      <span>🔥 불이야! 소방 출동 훈련</span>
    </div>
    <div class="gauge-wrap">
      <div class="gauge-label"><span>위험도</span><span id="gauge-percent">100%</span></div>
      <div class="gauge-bar"><div class="gauge-fill" id="gauge-fill"></div></div>
    </div>
    <div class="situation-box">
      <div class="situation-emoji" id="situation-emoji">🔥</div>
      <div class="situation-text" id="situation-text"></div>
    </div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </section>

  <!-- 클리어 화면 -->
  <section class="screen" id="screen-clear">
    <div class="clear-emoji">🏅</div>
    <h1>임무 완료!</h1>
    <p class="subtitle">리틀 히어로가 마을을 안전하게 지켰어요</p>
    <div class="stars-big" id="clear-stars">⭐⭐⭐</div>
    <div class="stat-card">
      처음 만에 맞힌 문제 <b id="clear-firsttry">10</b> / 10개
    </div>
    <button class="btn btn-primary" id="btn-clear-map">사건 지도로</button>
    <button class="btn btn-ghost" id="btn-clear-retry">다시 도전하기</button>
  </section>

</div>

<script>
(function(){
  "use strict";

  var QUESTIONS = [
    {
      situation: "집에서 불이 난 걸 발견했어요! 제일 먼저 뭘 해야 할까요?",
      options: [
        { text: "\"불이야!\" 큰 소리로 외치고 빨리 대피한다", correct: true },
        { text: "혼자 불을 꺼보려고 물건을 찾는다", correct: false },
        { text: "무서워서 그 자리에 숨는다", correct: false }
      ],
      hint: "혼자 해결하려 하지 말고, 다른 사람에게 알리고 안전한 곳으로 가야 해요."
    },
    {
      situation: "방 안에 연기가 가득 찼어요. 어떻게 움직여야 안전할까요?",
      options: [
        { text: "서서 빨리 뛰어간다", correct: false },
        { text: "몸을 낮추고 기어서 이동한다", correct: true },
        { text: "그 자리에 앉아서 기다린다", correct: false }
      ],
      hint: "연기는 위로 올라가요. 낮은 곳의 공기가 더 깨끗해요."
    },
    {
      situation: "대피하려는데 방문 손잡이가 뜨거워요! 어떻게 해야 할까요?",
      options: [
        { text: "뜨거워도 문을 힘껏 연다", correct: false },
        { text: "물을 뿌리고 문을 연다", correct: false },
        { text: "그 문을 열지 않고 다른 길로 대피한다", correct: true }
      ],
      hint: "손잡이가 뜨겁다는 건 문 반대편에 불이 있다는 신호예요."
    },
    {
      situation: "친구의 옷에 갑자기 불이 붙었어요! 어떻게 도와줄까요?",
      options: [
        { text: "\"멈춰, 엎드려, 굴러!\"를 외치고 함께 구른다", correct: true },
        { text: "친구를 손으로 두드려서 끈다", correct: false },
        { text: "친구를 혼자 두고 도망간다", correct: false }
      ],
      hint: "멈추고, 바닥에 엎드려서, 데굴데굴 굴러야 불이 꺼져요."
    },
    {
      situation: "대피할 때 엘리베이터와 계단 중 뭘 타야 할까요?",
      options: [
        { text: "엘리베이터를 탄다", correct: false },
        { text: "창문으로 뛰어내린다", correct: false },
        { text: "계단으로 걸어서 내려간다", correct: true }
      ],
      hint: "불이 나면 엘리베이터가 멈출 수 있어서 위험해요. 계단을 이용해요."
    },
    {
      situation: "안전한 곳으로 나왔어요. 이제 어디로 알려야 할까요?",
      options: [
        { text: "전화하지 않고 그냥 지켜본다", correct: false },
        { text: "119에 전화해서 불이 난 곳을 알린다", correct: true },
        { text: "친구에게만 문자로 알린다", correct: false }
      ],
      hint: "불이 나면 119(소방서)에 전화해서 정확한 위치를 알려줘야 해요."
    },
    {
      situation: "대피하는 중이에요. 아끼는 장난감을 가지러 다시 들어가도 될까요?",
      options: [
        { text: "장난감을 가지러 다시 들어간다", correct: false },
        { text: "장난감이 있는 곳까지 천천히 걸어간다", correct: false },
        { text: "안 된다, 몸만 빠르게 대피한다", correct: true }
      ],
      hint: "물건보다 내 몸이 훨씬 소중해요. 절대 다시 들어가면 안 돼요."
    },
    {
      situation: "연기 때문에 숨쉬기 힘들어요. 무엇으로 코와 입을 막으면 좋을까요?",
      options: [
        { text: "젖은 수건으로 코와 입을 막는다", correct: true },
        { text: "마른 종이로 막는다", correct: false },
        { text: "아무것도 막지 않고 숨을 참는다", correct: false }
      ],
      hint: "젖은 수건은 연기와 유해가스를 막는 데 도움이 돼요."
    },
    {
      situation: "\"삐--삐--\" 화재경보음이 울렸어요! 어떻게 해야 할까요?",
      options: [
        { text: "오작동일 거라 생각하고 무시한다", correct: false },
        { text: "소리가 멈출 때까지 기다린다", correct: false },
        { text: "즉시 하던 일을 멈추고 대피를 시작한다", correct: true }
      ],
      hint: "경보음이 울리면 진짜인지 확인할 시간이 없어요. 바로 대피해요."
    },
    {
      situation: "건물 밖으로 안전하게 나왔어요! 이제 어디에 있어야 할까요?",
      options: [
        { text: "다시 안에 들어가서 다른 사람을 찾는다", correct: false },
        { text: "정해진 대피 장소에서 기다린다", correct: true },
        { text: "혼자 멀리 다른 곳으로 걸어간다", correct: false }
      ],
      hint: "대피 장소에 모여 있어야 어른들이 우리를 안전하게 확인할 수 있어요."
    }
  ];

  var TOTAL = QUESTIONS.length;
  var STEP_DOWN = 100 / TOTAL;
  var STEP_UP = 3;
  var STORAGE_KEY = "lha_progress";

  var state = {
    qIndex: 0,
    danger: 100,
    firstTryCorrect: 0,
    triedThisQuestion: false
  };

  function $(id){ return document.getElementById(id); }

  function showScreen(id){
    document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
    $(id).classList.add("active");
  }

  function loadProgress(){
    try{
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    }catch(e){
      return {};
    }
  }

  function saveProgress(stars, firstTryCorrect){
    var data = loadProgress();
    var prev = data.stage1 || { bestStars: 0, bestFirstTry: 0 };
    data.stage1 = {
      cleared: true,
      bestStars: Math.max(prev.bestStars, stars),
      bestFirstTry: Math.max(prev.bestFirstTry, firstTryCorrect)
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function starString(n){
    var s = "";
    for(var i=0;i<3;i++){ s += i < n ? "⭐" : "☆"; }
    return s;
  }

  function refreshMainScreen(){
    var data = loadProgress();
    var box = $("main-progress");
    if(data.stage1 && data.stage1.cleared){
      box.style.display = "block";
      box.textContent = "지난 기록: " + starString(data.stage1.bestStars) + " (첫 시도 " + data.stage1.bestFirstTry + "/10)";
    } else {
      box.style.display = "none";
    }
  }

  function refreshMapScreen(){
    var data = loadProgress();
    var stars = (data.stage1 && data.stage1.bestStars) || 0;
    $("stage-1-stars").textContent = starString(stars);
  }

  function updateGauge(){
    var pct = Math.max(0, Math.min(100, state.danger));
    var fill = $("gauge-fill");
    fill.style.width = pct + "%";
    fill.classList.remove("warn","danger");
    if(pct > 66) {
      fill.classList.remove("warn","danger");
    } else if(pct > 33){
      fill.classList.add("warn");
    } else {
      fill.classList.add("danger");
    }
    $("gauge-percent").textContent = Math.round(pct) + "%";
  }

  function startStage1(){
    state.qIndex = 0;
    state.danger = 100;
    state.firstTryCorrect = 0;
    state.triedThisQuestion = false;
    showScreen("screen-battle");
    renderQuestion();
  }

  function renderQuestion(){
    var q = QUESTIONS[state.qIndex];
    state.triedThisQuestion = false;
    $("battle-progress").textContent = "문제 " + (state.qIndex+1) + "/" + TOTAL;
    $("situation-text").textContent = q.situation;
    $("feedback").textContent = "";
    updateGauge();

    var emoji = $("situation-emoji");
    emoji.classList.remove("shake","zap");

    var optionsBox = $("options");
    optionsBox.innerHTML = "";
    var order = q.options.map(function(o,i){ return i; });
    shuffle(order);
    order.forEach(function(i){
      var opt = q.options[i];
      var btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = opt.text;
      btn.addEventListener("click", function(){ onAnswer(opt, btn); });
      optionsBox.appendChild(btn);
    });
  }

  function shuffle(arr){
    for(var i=arr.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t = arr[i]; arr[i]=arr[j]; arr[j]=t;
    }
  }

  function setOptionsDisabled(disabled){
    document.querySelectorAll(".option-btn").forEach(function(b){ b.disabled = disabled; });
  }

  function onAnswer(opt, btn){
    setOptionsDisabled(true);
    var emoji = $("situation-emoji");

    if(opt.correct){
      btn.classList.add("correct");
      emoji.classList.add("zap");
      if(!state.triedThisQuestion){
        state.firstTryCorrect++;
      }
      state.danger = Math.max(0, state.danger - STEP_DOWN);
      updateGauge();
      $("feedback").textContent = "정답이에요! 위험도가 줄었어요.";

      setTimeout(function(){
        state.qIndex++;
        if(state.qIndex >= TOTAL){
          finishStage();
        } else {
          renderQuestion();
        }
      }, 900);

    } else {
      btn.classList.add("wrong");
      emoji.classList.add("shake");
      state.triedThisQuestion = true;
      state.danger = Math.min(100, state.danger + STEP_UP);
      updateGauge();
      var q = QUESTIONS[state.qIndex];
      $("feedback").textContent = "다시 생각해볼까요? 힌트: " + q.hint;

      setTimeout(function(){
        emoji.classList.remove("shake");
        btn.classList.remove("wrong");
        setOptionsDisabled(false);
      }, 900);
    }
  }

  function finishStage(){
    var stars = 1;
    if(state.firstTryCorrect === TOTAL) stars = 3;
    else if(state.firstTryCorrect >= 7) stars = 2;

    saveProgress(stars, state.firstTryCorrect);

    $("clear-stars").textContent = starString(stars);
    $("clear-firsttry").textContent = state.firstTryCorrect;

    showScreen("screen-clear");
  }

  $("btn-start").addEventListener("click", function(){
    refreshMapScreen();
    showScreen("screen-map");
  });
  $("btn-map-back").addEventListener("click", function(){
    refreshMainScreen();
    showScreen("screen-main");
  });
  $("stage-1-card").addEventListener("click", startStage1);
  $("btn-clear-map").addEventListener("click", function(){
    refreshMapScreen();
    showScreen("screen-map");
  });
  $("btn-clear-retry").addEventListener("click", startStage1);

  refreshMainScreen();
})();
</script>
</body>
</html>
